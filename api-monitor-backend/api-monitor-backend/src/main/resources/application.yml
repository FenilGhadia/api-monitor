server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: api-monitor-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: ApiMonitorPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC
    serialization:
      WRITE_DATES_AS_TIMESTAMPS : false

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 1000
        keep-alive: 60s
      thread-name-prefix: async-log-

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000
      refresh-token:
        expiration: 604800000

  monitoring:
    excluded-paths:
      - /api/v1/auth
      - /api/v1/logs
      - /api/v1/analytics
      - /actuator
      - /error
    slow-request-threshold-ms: 1000
    alert:
      error-rate-threshold: 10.0
      response-time-threshold-ms: 2000

logging:
  level:
    root: INFO
    com.apimonitor: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized